# ─────────────────────────────────────────────────────────────────────────────
#  FeoSport2 — Unified stack
#  Запуск:  docker-compose -f docker-compose.unified.yml up -d --build
#  Доступ:  http://localhost        — FeoSport2 (судьи / участники)
#           http://localhost/tmx/   — TMX турнирная сетка (главный судья)
#           http://localhost/api/   — REST API
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-feosport2}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend: Node.js + Express + Socket.io ─────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:        8090
      DB_HOST:     db
      DB_NAME:     ${DB_NAME:-feosport2}
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET:  ${JWT_SECRET:-change_me_in_production}
      FD_EMAIL:    ${FD_EMAIL:-}
      FD_PASSWORD: ${FD_PASSWORD:-}
      FD_FORM_ID:  ${FD_FORM_ID:-245167}
    expose:
      - "8090"

  # ── Frontend: React + Vite + MUI ──────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost}
    expose:
      - "8080"

  # ── TMX: Tournament Management eXtreme ────────────────────────────────────
  # Builds the entire feoTEST/ workspace so sibling packages are available.
  # Served as a static SPA at http://HOST/tmx/
  tmx:
    build:
      context: ./feoTEST       # копируем весь feoTEST/ (TMX + пакеты)
      dockerfile: TMX/Dockerfile
    restart: unless-stopped
    expose:
      - "3000"

  # ── Nginx: reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - tmx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/nginx.unified.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
