server {
    listen 3000;
    root  /usr/share/nginx/html;
    index index.html;

    # Serve TMX SPA under /tmx/ — unknown sub-paths → /tmx/index.html
    location /tmx/ {
        try_files $uri $uri/ /tmx/index.html;
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache immutable assets (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|svg|woff2|ico|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
