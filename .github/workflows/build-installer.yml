name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout tods-competition-factory
        uses: actions/checkout@v4
        with:
          repository: CourtHive/tods-competition-factory
          ref: master
          path: feoTEST/factory

      - name: Checkout courthive-components
        uses: actions/checkout@v4
        with:
          repository: CourtHive/courthive-components
          ref: main
          path: feoTEST/courthive-components

      - name: Checkout provider-config
        uses: actions/checkout@v4
        with:
          repository: CourtHive/provider-config
          ref: main
          path: feoTEST/provider-config

      - name: Checkout scoringVisualizations
        uses: actions/checkout@v4
        with:
          repository: CourtHive/scoringVisualizations
          ref: main
          path: feoTEST/scoringVisualizations

      - name: Checkout pdf-factory
        uses: actions/checkout@v4
        with:
          repository: CourtHive/pdf-factory
          ref: main
          path: feoTEST/pdf-factory

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── pnpm (для TMX и sibling packages) ─────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '11.1.2'
          run_install: false

      - name: Configure pnpm scripts for Windows Git Bash
        shell: pwsh
        run: pnpm config set script-shell "C:\Program Files\Git\bin\bash.exe"

      # ── pkg (Node → EXE) ──────────────────────────────────────────────────────
      - name: Install pkg globally
        run: npm install -g pkg

      # ── Inno Setup 6 ──────────────────────────────────────────────────────────
      - name: Install Inno Setup 6
        run: choco install innosetup -y --no-progress

      # ── Кэш PostgreSQL installer (~300 MB) ───────────────────────────────────
      - name: Cache PostgreSQL installer
        id: cache-pg
        uses: actions/cache@v4
        with:
          path: deploy/windows/build/deps/postgresql-16-win-x64.exe
          key: postgresql-16.3-1-win-x64

      - name: Download PostgreSQL 16 installer
        if: steps.cache-pg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path deploy\windows\build\deps | Out-Null
          $url = "https://get.enterprisedb.com/postgresql/postgresql-16.3-1-windows-x64.exe"
          $out = "deploy\windows\build\deps\postgresql-16-win-x64.exe"
          Write-Host "Downloading PostgreSQL installer..."
          $wc = New-Object System.Net.WebClient
          $wc.DownloadFile($url, $out)
          $mb = [Math]::Round((Get-Item $out).Length / 1MB, 0)
          Write-Host "Downloaded: $mb MB"

      # ── Шаг 1: Backend → feosport2-server.exe ────────────────────────────────
      - name: Build backend (pkg → feosport2-server.exe)
        shell: pwsh
        run: |
          Set-Location backend
          npm cache clean --force
          npm ci --silent
          if ($LASTEXITCODE -ne 0) { throw "backend npm ci failed with code $LASTEXITCODE" }
          $out = "..\deploy\windows\build\staging\app\feosport2-server.exe"
          New-Item -ItemType Directory -Force -Path "..\deploy\windows\build\staging\app\scripts" | Out-Null
          pkg src/server-bundled.js `
            --target node18-win-x64 `
            --output $out `
            --compress GZip
          if ($LASTEXITCODE -ne 0) { throw "pkg failed with code $LASTEXITCODE" }
          if (-not (Test-Path $out)) { throw "pkg did not produce exe" }
          $mb = [Math]::Round((Get-Item $out).Length / 1MB, 1)
          Write-Host "feosport2-server.exe: $mb MB"
          Copy-Item "scripts\seed.js" "..\deploy\windows\build\staging\app\scripts\seed.js" -Force

      # ── Шаг 2: Frontend → vite build ─────────────────────────────────────────
      - name: Build frontend (vite)
        shell: pwsh
        env:
          VITE_API_URL: ''
        run: |
          Set-Location frontend
          npm ci --include=dev --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) { throw "frontend npm ci failed with code $LASTEXITCODE" }
          if (-not (Test-Path "node_modules\.bin\vite.cmd")) {
            npm ls vite
            throw "frontend install did not create node_modules/.bin/vite.cmd"
          }
          npm run build
          if ($LASTEXITCODE -ne 0) { throw "frontend build failed with code $LASTEXITCODE" }
          $dist = "dist"
          if (-not (Test-Path $dist)) { throw "vite build did not produce dist/" }
          $dst = "..\deploy\windows\build\staging\frontend-dist"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item "$dist\*" $dst -Recurse -Force
          $n = (Get-ChildItem $dst -Recurse -File).Count
          Write-Host "frontend-dist: $n files"

      # ── Шаг 2b: TMX → vite build ─────────────────────────────────────────────
      - name: Build TMX local package dependencies
        shell: bash
        run: |
          set -euo pipefail
          chmod +x feoTEST/factory/esbuild.mjs || true

          build_package() {
            local dir="$1"
            echo "::group::Build $dir"
            pnpm --dir "$dir" install --ignore-scripts --frozen-lockfile
            pnpm --dir "$dir" run build
            echo "::endgroup::"
          }

          build_package feoTEST/factory
          build_package feoTEST/provider-config
          build_package feoTEST/scoringVisualizations
          build_package feoTEST/pdf-factory
          build_package feoTEST/courthive-components

      - name: Build TMX (pnpm + vite)
        shell: pwsh
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          CI: 'true'
          BASE_URL: 'tmx'
        run: |
          $tmxDir = "feoTEST\TMX"
          if (-not (Test-Path $tmxDir)) {
            Write-Host "feoTEST\TMX not found — skipping TMX build"
            New-Item -ItemType Directory -Force -Path "deploy\windows\build\staging\tmx-dist" | Out-Null
            exit 0
          }
          Set-Location $tmxDir
          pnpm install --ignore-scripts --frozen-lockfile
          if ($LASTEXITCODE -ne 0) { throw "TMX pnpm install failed with code $LASTEXITCODE" }
          pnpm exec rimraf dist
          if ($LASTEXITCODE -ne 0) { throw "TMX rimraf failed with code $LASTEXITCODE" }
          pnpm exec vite build
          if ($LASTEXITCODE -ne 0) { throw "TMX vite build failed with code $LASTEXITCODE" }
          if (-not (Test-Path "dist")) { throw "TMX vite build did not produce dist/" }
          Set-Location ..\..
          $dst = "deploy\windows\build\staging\tmx-dist"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item "feoTEST\TMX\dist\*" $dst -Recurse -Force
          $n = (Get-ChildItem $dst -Recurse -File).Count
          Write-Host "tmx-dist: $n files"

      # ── Шаг 3: Копировать SQL ─────────────────────────────────────────────────
      - name: Copy database SQL files
        shell: pwsh
        run: |
          $dst = "deploy\windows\build\staging\database"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item "database\init.sql" "$dst\init.sql" -Force
          Copy-Item "database\seed.sql" "$dst\seed.sql" -Force
          Write-Host "init.sql + seed.sql copied"

      # ── Шаг 4: Собрать Inno Setup installer ──────────────────────────────────
      - name: Compile installer (ISCC)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue)?.Source
            if (-not $iscc) { throw "ISCC.exe not found" }
          }
          $issFile = "deploy\windows\build\feosport2.iss"
          New-Item -ItemType Directory -Force -Path "deploy\windows\output" | Out-Null
          & $iscc $issFile
          if ($LASTEXITCODE -ne 0) { throw "ISCC exited with code $LASTEXITCODE" }
          $exe = "deploy\windows\output\FeoSport2-Setup.exe"
          if (-not (Test-Path $exe)) { throw "Installer not created" }
          $mb = [Math]::Round((Get-Item $exe).Length / 1MB, 0)
          Write-Host "FeoSport2-Setup.exe: $mb MB"

      # ── Загрузить артефакт ─────────────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FeoSport2-Setup
          path: deploy/windows/output/FeoSport2-Setup.exe
          retention-days: 30
          if-no-files-found: error
