name: AQA

on:
  workflow_call:
    inputs:
      run_e2e:
        description: 'Run TMX Playwright E2E suite'
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run TMX Playwright E2E suite'
        required: false
        default: false
        type: boolean
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: feosport2
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Backend tests are real integration tests; wait for Postgres before
        # Jest starts seeding and applying SQL migrations.
        options: >-
          --health-cmd "pg_isready -U postgres -d feosport2"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: feosport2
      DB_USER: postgres
      DB_PASSWORD: postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: Run backend Jest tests
        working-directory: backend
        run: npm test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-24.04
    env:
      VITE_API_URL: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --include=dev --no-audit --no-fund

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  tmx-unit:
    name: TMX typecheck and unit tests
    runs-on: ubuntu-24.04
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      CI: 'true'
      TZ: UTC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm 11.1.2
        uses: pnpm/action-setup@v6
        with:
          version: '11.1.2'
          run_install: false

      - name: Install TMX dependencies
        working-directory: feoTEST/TMX
        run: pnpm install --ignore-scripts --frozen-lockfile

      - name: Typecheck TMX
        working-directory: feoTEST/TMX
        run: pnpm run check-types 2>&1 | tee tmx-typecheck.log

      - name: Upload TMX typecheck log
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: tmx-typecheck-log
          path: feoTEST/TMX/tmx-typecheck.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Run TMX Vitest suite
        working-directory: feoTEST/TMX
        run: pnpm exec vitest run

  tmx-e2e:
    name: TMX Playwright E2E
    runs-on: ubuntu-24.04
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.run_e2e }}
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      CI: 'true'
      TZ: UTC

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm 11.1.2
        uses: pnpm/action-setup@v6
        with:
          version: '11.1.2'
          run_install: false

      - name: Install TMX dependencies
        working-directory: feoTEST/TMX
        run: pnpm install --ignore-scripts --frozen-lockfile

      - name: Install Chromium for Playwright
        working-directory: feoTEST/TMX
        run: pnpm exec playwright install --with-deps chromium

      - name: Run TMX Playwright E2E suite
        working-directory: feoTEST/TMX
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: tmx-playwright-report
          path: feoTEST/TMX/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: tmx-playwright-test-results
          path: feoTEST/TMX/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 14
