version: '3.9'

# Production compose — запускать из корня проекта:
# docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d --build

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context:    ../backend
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:        8090
      DB_HOST:     db
      DB_NAME:     ${POSTGRES_DB}
      DB_USER:     ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
      DOCUMENT_ENCRYPTION_KEY:    ${DOCUMENT_ENCRYPTION_KEY}
      DOCUMENT_ENCRYPTION_KEY_ID: ${DOCUMENT_ENCRYPTION_KEY_ID:-local-v1}
      NODE_ENV:    production
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/healthz || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ../frontend
      dockerfile: Dockerfile.prod
      # VITE_API_URL пустой → axios шлёт на /api → Nginx проксирует на backend
      args:
        VITE_API_URL: ""
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks: [internal]

  # ── Nginx (единственный публичный порт) ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on: [frontend, backend]
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pg_data:
